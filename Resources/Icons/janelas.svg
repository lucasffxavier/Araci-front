<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>Abrir nova vista de projeto</title>

  <!-- Janela principal (fundo) - interior branco -->
  <rect x="15" y="30" width="120" height="90" rx="5" fill="white" stroke="black" stroke-width="6"/>
  <rect x="15" y="30" width="120" height="28" rx="5" fill="black"/>
  <rect x="15" y="48" width="120" height="10" fill="black"/>
  <circle cx="28" cy="39" r="4" fill="white"/>
  <circle cx="43" cy="39" r="4" fill="white"/>

  <!-- Janela nova (frente) - interior branco -->
  <rect x="65" y="80" width="120" height="90" rx="5" fill="white" stroke="black" stroke-width="6"/>
  <rect x="65" y="80" width="120" height="28" rx="5" fill="black"/>
  <rect x="65" y="98" width="120" height="10" fill="black"/>
  <circle cx="78" cy="89" r="4" fill="white"/>
  <circle cx="93" cy="89" r="4" fill="white"/>

  <!-- Sinal de + na janela nova -->
  <line x1="125" y1="125" x2="125" y2="153" stroke="black" stroke-width="7" stroke-linecap="round"/>
  <line x1="111" y1="139" x2="139" y2="139" stroke="black" stroke-width="7" stroke-linecap="round"/>
</svg>
