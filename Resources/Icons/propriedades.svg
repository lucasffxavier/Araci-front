<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>Propriedades de elemento</title>

  <!-- Documento base -->
  <rect x="40" y="25" width="100" height="130" rx="6" fill="white" stroke="black" stroke-width="7"/>
  <!-- Dobra canto superior direito -->
  <polyline points="112,25 140,53" fill="none" stroke="black" stroke-width="7" stroke-linecap="round"/>
  <polyline points="112,25 112,53 140,53" fill="none" stroke="black" stroke-width="5" stroke-linejoin="round"/>

  <!-- Linhas de propriedades -->
  <line x1="58" y1="80" x2="122" y2="80" stroke="black" stroke-width="6" stroke-linecap="round"/>
  <line x1="58" y1="100" x2="122" y2="100" stroke="black" stroke-width="6" stroke-linecap="round"/>
  <line x1="58" y1="120" x2="100" y2="120" stroke="black" stroke-width="6" stroke-linecap="round"/>

  <!-- Engrenagem -->
  <g transform="translate(148,148)">
    <circle cx="0" cy="0" r="16" fill="white" stroke="black" stroke-width="6"/>
    <circle cx="0" cy="0" r="6" fill="black"/>
    <rect x="-4" y="-24" width="8" height="10" rx="2" fill="black"/>
    <rect x="-4" y="14" width="8" height="10" rx="2" fill="black"/>
    <rect x="14" y="-4" width="10" height="8" rx="2" fill="black"/>
    <rect x="-24" y="-4" width="10" height="8" rx="2" fill="black"/>
    <rect x="9" y="-20" width="8" height="10" rx="2" fill="black" transform="rotate(45)"/>
    <rect x="9" y="-20" width="8" height="10" rx="2" fill="black" transform="rotate(90)"/>
    <rect x="9" y="-20" width="8" height="10" rx="2" fill="black" transform="rotate(135)"/>
    <rect x="9" y="-20" width="8" height="10" rx="2" fill="black" transform="rotate(180)"/>
  </g>
</svg>
