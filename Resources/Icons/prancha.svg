<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>Criar nova prancha</title>

  <!-- Prancha - interior branco -->
  <rect x="20" y="15" width="130" height="110" rx="3" fill="white" stroke="black" stroke-width="6"/>
  <!-- Borda interna (margem técnica) -->
  <rect x="30" y="24" width="110" height="92" rx="2" fill="none" stroke="black" stroke-width="2.5"/>

  <!-- Legenda inferior -->
  <line x1="30" y1="100" x2="140" y2="100" stroke="black" stroke-width="2.5"/>
  <line x1="85" y1="100" x2="85" y2="116" stroke="black" stroke-width="2.5"/>

  <!-- Linhas de conteúdo -->
  <line x1="45" y1="50" x2="125" y2="50" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <line x1="45" y1="65" x2="125" y2="65" stroke="black" stroke-width="3" stroke-linecap="round"/>
  <line x1="45" y1="80" x2="90" y2="80" stroke="black" stroke-width="3" stroke-linecap="round"/>

  <!-- Círculo com + -->
  <circle cx="152" cy="152" r="32" fill="black"/>
  <line x1="152" y1="136" x2="152" y2="168" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="136" y1="152" x2="168" y2="152" stroke="white" stroke-width="8" stroke-linecap="round"/>
</svg>
