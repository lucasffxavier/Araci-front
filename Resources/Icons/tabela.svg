<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>Criar nova tabela de informações</title>

  <!-- Tabela -->
  <rect x="15" y="20" width="130" height="100" rx="5" fill="none" stroke="black" stroke-width="6"/>

  <!-- Cabeçalho preenchido -->
  <rect x="15" y="20" width="130" height="28" rx="5" fill="black"/>
  <rect x="15" y="38" width="130" height="10" fill="black"/>

  <!-- Colunas verticais -->
  <line x1="65" y1="48" x2="65" y2="120" stroke="black" stroke-width="5"/>
  <line x1="110" y1="48" x2="110" y2="120" stroke="black" stroke-width="5"/>

  <!-- Linhas horizontais internas -->
  <line x1="15" y1="72" x2="145" y2="72" stroke="black" stroke-width="4"/>
  <line x1="15" y1="96" x2="145" y2="96" stroke="black" stroke-width="4"/>

  <!-- Círculo com + -->
  <circle cx="155" cy="150" r="32" fill="black"/>
  <line x1="155" y1="134" x2="155" y2="166" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="139" y1="150" x2="171" y2="150" stroke="white" stroke-width="8" stroke-linecap="round"/>
</svg>
