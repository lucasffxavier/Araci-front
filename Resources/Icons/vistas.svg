<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>Abrir nova vista de projeto</title>
  <rect width="200" height="200" fill="white"/>

  <!-- Janela principal (fundo) -->
  <rect x="15" y="30" width="120" height="90" rx="5" fill="white" stroke="black" stroke-width="6"/>
  <line x1="15" y1="48" x2="135" y2="48" stroke="black" stroke-width="6" stroke-linecap="round"/>
  <circle cx="28" cy="39" r="4" fill="black"/>
  <circle cx="43" cy="39" r="4" fill="black"/>

  <!-- Janela nova (frente, deslocada) -->
  <rect x="65" y="80" width="120" height="90" rx="5" fill="white" stroke="black" stroke-width="6"/>
  <line x1="65" y1="98" x2="185" y2="98" stroke="black" stroke-width="6" stroke-linecap="round"/>
  <circle cx="78" cy="89" r="4" fill="black"/>
  <circle cx="93" cy="89" r="4" fill="black"/>

  <!-- Sinal de + na janela nova -->
  <line x1="125" y1="130" x2="125" y2="158" stroke="black" stroke-width="7" stroke-linecap="round"/>
  <line x1="111" y1="144" x2="139" y2="144" stroke="black" stroke-width="7" stroke-linecap="round"/>
</svg>
